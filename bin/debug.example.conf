# conf file for debug bot
username = debug
nickname = debug
hostname = undernet.org
userdescription = GNUWorld Debug Services

mode = +ik

# If set to yes/true, the module runs in stealth mode: no iClient is
# created or burst onto the network. Address the bot as nick@server
# (e.g. /msg debug@services.undernet.org USERINFO nick).
# Unset or any other value means stealth is disabled.
#stealth = yes

# permit the given user -- by account login name -- to use the
# module.  You may have as many of these as you like (including none).
# This is case-insensitive.
permit_user = YourAccount
